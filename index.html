<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Restore path encoded by 404.html redirect
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var q = params.get('q');
          params.delete('p');
          params.delete('q');
          var rest = params.toString();
          window.history.replaceState(
            null, null,
            p + (q ? '?' + q : '') + (rest ? (q ? '&' : '?') + rest : '') + window.location.hash
          );
        }
      })();
    </script>
