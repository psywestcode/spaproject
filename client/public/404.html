<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CampusConnect</title>
    <script>
      // SPA redirect: encode the path into a query param so GitHub Pages
      // serves index.html, which then restores the real URL via history API.
      var l = window.location;
      var segmentCount = 1; // depth of the repo name in the path
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
